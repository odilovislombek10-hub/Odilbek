[/Script/Engine.RendererSettings]
; =========================================================
; RTX 3090 / 3090 Ti 24GB VRAM - UE 5.5 ArchViz Explorer
; Target: high quality, stable Nanite + Lumen, safe packaging
; =========================================================

; ---------- Core Render Pipeline ----------
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
r.RayTracing=True
r.PathTracing=False
r.SkinCache.CompileShaders=True
r.SkinCache.Mode=1

; ---------- VR / Stereo (only affects HMD stereo rendering; flat levels unaffected) ----------
; Instanced Stereo: renders both eyes in one pass -> ~30-40% CPU render-thread saving in VR.
; --- VR RENDERER CRASH FIX (2026-07-03) ---
; SABAB: VR Play => EXCEPTION_ACCESS_VIOLATION (0x90) UnrealEditor_Renderer ichida,
;   "Recreating Persistent SBTs ... NumGeometrySegments 0->2304" dan keyin (RenderThread).
;   Bu Lumen Hardware Ray Tracing + Instanced Stereo ning UE5.6+ ma'lum crash juftligi.
;   Foydalanuvchi HWRT'ni saqlashni tanladi => juftlikni Instanced Stereo tomondan uzamiz.
;   Faqat VR render narxiga ta'sir qiladi; HWRT vizuali va flat levellar o'zgarmaydi.
vr.InstancedStereo=False
; RT pipeline'ni tayyor bo'lmagan holda ishlatishdan (null RTPSO) himoya - qo'shimcha barqarorlik.
r.RayTracing.NonBlockingPipelineCreation=0

; ---------- RHI / AA / Resolution ----------
r.DefaultFeature.AntiAliasing=2
r.AntiAliasingMethod=4
r.PostProcessAAQuality=6
r.TemporalAA.Upsampling=0
r.ScreenPercentage=100
r.SecondaryScreenPercentage.GameViewport=100
r.DynamicRes.OperationMode=0
r.SceneColorFringeQuality=0
r.Tonemapper.Sharpen=1.5

; ---------- Exposure / Local Exposure ----------
r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=True
r.DefaultFeature.LocalExposure.HighlightContrastScale=0.8
r.DefaultFeature.LocalExposure.ShadowContrastScale=0.8

; ---------- Lumen GI / Reflections ----------
; 2026-07-04: Lumen HWRT oldingi holatiga (True) qaytarildi. Shadows/Skylight True qoldirildi (foydalanuvchi buyrug'i).
r.Lumen.HardwareRayTracing=True
; --- Lumen HWRT GPU crash fix (2026-07-03, qayta tiklandi) ---
; SABAB: Lumen async-compute "RayTracing Miss" DMA page-fault => GPU crash (VRAM emas).
; MUHIM: r.Lumen.HardwareRayTracing.Async UE5.8 da YO'Q (no-op). Haqiqiy cvar = DiffuseIndirect.AsyncCompute.
; Bu tuzatma E:\mmirmmmmm konfigini ko'chirganda o'chib ketgan edi, qaytadan qo'yildi.
r.Lumen.DiffuseIndirect.AsyncCompute=0
r.GPUCrashDebugging=1
r.Lumen.TraceMeshSDF=1
r.Lumen.Reflections=1
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.ScreenTraces=1
r.Lumen.Reflections.HardwareRayTracing=1
r.Lumen.Translucency.Reflections=1
r.Lumen.Translucency.Reflections.HardwareRayTracing=0
; --- FrontLayerTranslucency crash fix (2026-07-03) ---
; FrontLayerTranslucency.cpp:716 ensure: GBuffer yaratiladi lekin hech qaysi view passni render qilmaydi (UE5 RDG bug).
; Glass front-layer reflectionni project darajasida o'chirdik; SSR + Lumen reflection saqlanadi.
r.Lumen.TranslucencyReflections.FrontLayer.EnableForProject=False
r.Lumen.TranslucencyReflections.FrontLayer.Allow=0
r.Lumen.ScreenProbeGather.RadianceCache.ProbeResolution=16
r.Lumen.ScreenProbeGather.DownsampleFactor=16
r.LumenScene.SurfaceCache.CardCaptureFactor=8

; ---------- Ray Tracing balanced for RTX 3090 ----------
; --- 2026-07-04: hammasi crashdan oldingi holatga to'liq qaytarildi (foydalanuvchi buyrug'i) ---
r.RayTracing.Shadows=False
r.RayTracing.UseTextureLod=True
r.RayTracing.Skylight=False
r.RayTracing.Reflections=0
r.RayTracing.Reflections.MaxRoughness=0.75
r.RayTracing.Geometry.Instancing=1
r.RayTracing.Geometry.StripMinLodData=1
; --- RT Geometry residency fix (2026-07-03 FINAL, memreport ma'lumoti bilan tasdiqlangan) ---
; MUAMMO: "ALWAYS RESIDENT / REQUESTED MEMORY OVER BUDGET (0 B / 15,999 EiB)" ekran xatosi.
; JONLI MA'LUMOT (memreport, Glavniy_MirMIron PIE): haqiqiy RT AS xotirasi = ~2.3 GB, budget = 4 GB.
; Ya'ni budget HAQIQATDA oshmayapti — xato SOXTA. "0 B / 15,999 EiB" = accounting buzilgan
; (0 B = reference-hisoblagichlar nol, 15,999 EiB = 2^64 overflow / cheksiz budget).
; ILDIZ SABAB: UseReferenceBasedResidency=0 qilib qo'yilgan edi. Engine STANDARTI = 1 (true).
; =0 fixed-pool rejimda reference-based over-budget tekshiruvi initsializatsiyalanmagan holatdan ishga
; tushib, soxta ogohlantirish beradi. Katta loyihalar buni standart (=1) qoldirib, xatoni ko'rmaydi.
; YECHIM: engine standartiga qaytarish => =1. Pool 4096 endi "cache hint" bo'ladi, residency manager
; ishlatilmagan BLAS'ni evict qilib, haqiqiy budgetni to'g'ri hisoblaydi. NumAlwaysResidentLODs=0 bilan
; birga agressiv evict bo'ladi. (Bu oldingi =0 "fix"ni JONLI MA'LUMOT asosida tuzatadi.)
r.RayTracing.ResidentGeometryMemoryPoolSizeInMB=4096
r.RayTracing.UseReferenceBasedResidency=1
r.RayTracing.NumAlwaysResidentLODs=0
r.RayTracing.Culling=1
r.RayTracing.Culling.Radius=12000
r.RayTracing.Culling.Angle=1

; ---------- Nanite stable ----------
r.Nanite=1
r.Nanite.CheckEnableSupport=0
r.Nanite.AllowInvalidData=1
r.Nanite.AllowTessellation=0
r.Nanite.MaxPixelsPerEdge=1.0
r.Nanite.Streaming.PoolSize=2048
r.Nanite.Streaming.NumInitialRootPages=8192
r.Nanite.Streaming.MaxPageInstallsPerFrame=128
r.Nanite.Streaming.Async=1

; ---------- Virtual Texturing ----------
r.VirtualTextures=True
r.VirtualTexturedLightmaps=True
r.Streaming.VirtualTextures=True
; r.Mobile.VirtualTextures O'CHIRILDI: UE5.8 da deprecated => har startup'da "Handled ensure" (ConsoleManager.cpp:4916)
; ekranga xato chiqarardi. r.VirtualTextures=True yuqorida allaqachon bor. (2026-07-02 o'chirilgan edi, E: config qaytargan)
bEnableVirtualTexturePostProcessing=True
r.VT.AnisotropicFiltering=True
r.VT.MaxUploadsPerFrame=8
r.VT.MaxUploadsPerFrameInEditor=16

; ---------- Texture Streaming for 24GB VRAM ----------
r.TextureStreaming=1
; Pool 6144->9216: "TEXTURE STREAMING POOL OVER 53.16 MiB BUDGET" uchun headroom + DeviceProfiles bilan moslashtirildi (2026-07-03)
r.Streaming.PoolSize=9216
r.Streaming.MaxTempMemoryAllowed=2048
r.Streaming.MipBias=0
r.MipMapLODBias=0
r.Streaming.FullyLoadUsedTextures=False
r.Streaming.UseFixedPoolSize=1
r.Streaming.LimitPoolSizeToVRAM=1
r.Streaming.AmortizeCPUToGPUCopy=1
r.Streaming.DefragDynamicBounds=1

; ---------- Shadows ----------
r.Shadow.Virtual.Enable=1
; VSM "Non-Nanite Marking Job Queue overflow" ekran xabarini o'chirish (2026-07-03).
; Sabab: Level/Export CAD proplar + foliage Nanite emas, katta shadow-map maydonini qoplaydi.
; Bu faqat xabarni yashiradi (performansga ta'sir yo'q); asl yechim = og'ir meshlarni Nanite'ga o'tkazish.
r.Shadow.Virtual.AllowScreenOverflowMessages=0
r.Shadow.Virtual.OnePassProjection.MaxLightsPerPixel=32
r.Shadow.CSM.MaxCascades=4
r.Shadow.MaxResolution=2048
r.Shadow.RadiusThreshold=0.015
r.Shadow.DistanceScale=1.3
r.Shadow.TransitionScale=0.8
r.DFShadowQuality=3
r.LightFunctionQuality=1
r.Shadow.UnbuiltPreviewInGame=True

; ---------- Reflections / SSR / Translucency ----------
r.SSR.Quality=3
r.SSR.Temporal=1
r.SSR.HalfResSceneColor=0
r.RefractionQuality=2
r.SeparateTranslucency=1
r.TranslucentSortPolicy=2
r.ReflectionCaptureResolution=1024
r.ReflectionEnvironmentLightmapMixing=1
r.HighQualityLightMaps=True

; ---------- Performance / Threading ----------
r.EarlyZPass=2
r.EarlyZPassMovable=True
r.HZBOcclusion=1
r.OneFrameThreadLag=1
r.RenderTargetPoolMin=800
r.ShaderPipelineCache.Enabled=1
r.ShaderPipelineCache.StartupMode=3
r.GTSyncType=1

; ---------- Fast VRAM hints ----------
r.FastVRam.GBufferA=1
r.FastVRam.GBufferB=1
r.FastVRam.GBufferC=1
r.FastVRam.SceneDepth=1

; ---------- Fog / AO / Post ----------
r.SSS.Scale=1
r.SSS.Quality=1
r.SSS.SampleSetQuality=1
r.VolumetricFog=1
r.VolumetricFog.GridPixelSize=16
r.VolumetricFog.GridSizeZ=96
r.VolumetricFog.HistoryWeight=0.9
; 2026-07-04: crashdan oldingi holatga to'liq qaytarildi -> GTAO (1). DIQQAT: FGTAOTemporalFilterCS SceneVelocityTexture crash shu sozlamadan chiqqan edi.
r.AmbientOcclusion.Method=1
r.AmbientOcclusionLevels=2
r.AmbientOcclusionMaxQuality=75
r.AmbientOcclusionRadiusScale=1.2
r.MinRoughnessOverride=0.02

; ---------- Quality lock ----------
r.MaterialQualityLevel=3
r.ForceDebugViewModes=0
r.ForceLOD=0
r.SkeletalMeshLODBias=0
r.StaticMeshLODBias=0
r.AllowStaticLighting=False

