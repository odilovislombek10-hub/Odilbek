[/Script/Engine.DeviceProfileManager]
+DeviceProfiles=Windows
+DeviceProfiles=WindowsEditor
+DeviceProfiles=WindowsNoEditor
+DeviceProfiles=WindowsServer

[Windows DeviceProfile]
BaseProfileName=
DeviceType=PC
bIsDefaultProfile=False
bDeviceProfileOverride=False

; RTX 3090 / high-end ArchViz realtime profile.
; Lumen is the realtime GI/reflection path. Path Tracing is enabled for viewport/cinematic mode.
CVars=r.DynamicGlobalIlluminationMethod=1
CVars=r.ReflectionMethod=1
CVars=r.RayTracing=True
CVars=r.PathTracing=True
CVars=r.SkinCache.CompileShaders=True

; Crisp image, no dynamic resolution.
CVars=r.DefaultFeature.AntiAliasing=2
CVars=r.AntiAliasingMethod=4
CVars=r.PostProcessAAQuality=6
CVars=r.TemporalAA.Upsampling=0
CVars=r.ScreenPercentage=100
CVars=r.SecondaryScreenPercentage.GameViewport=100
CVars=r.DynamicRes.OperationMode=0
CVars=r.SceneColorFringeQuality=0
CVars=r.Tonemapper.Sharpen=1.0
CVars=r.MaxAnisotropy=16

; Lumen high quality with hardware ray tracing.
CVars=r.Lumen.HardwareRayTracing=1
CVars=r.Lumen.TraceMeshSDF=1
CVars=r.Lumen.Reflections=1
CVars=r.Lumen.Reflections.Allow=1
CVars=r.Lumen.Reflections.ScreenTraces=1
CVars=r.Lumen.Reflections.HardwareRayTracing=1
CVars=r.Lumen.Reflections.MaxRoughness=1
CVars=r.Lumen.Translucency.Reflections=1
CVars=r.Lumen.Translucency.Reflections.HardwareRayTracing=1
CVars=r.Lumen.ScreenProbeGather.DownsampleFactor=8
CVars=r.Lumen.ScreenProbeGather.RadianceCache.ProbeResolution=32
CVars=r.Lumen.ScreenProbeGather.TracingOctahedronResolution=16
CVars=r.LumenScene.LightingQuality=4
CVars=r.LumenScene.ViewDistance=40000
CVars=r.LumenScene.Detail=4

; Lumen HardwareRayTracing (above) already computes GI/Reflections/Shadows via RT;
; legacy RT.Shadows/Skylight/Reflections are OFF to avoid doing the same work twice.
CVars=r.RayTracing.Shadows=False
CVars=r.RayTracing.Shadows.SamplesPerPixel=2
CVars=r.RayTracing.Skylight=False
CVars=r.RayTracing.Reflections=0
CVars=r.RayTracing.Reflections.SamplesPerPixel=2
CVars=r.RayTracing.Reflections.MaxRoughness=1
CVars=r.RayTracing.UseTextureLod=True
CVars=r.RayTracing.Geometry.Instancing=1
CVars=r.RayTracing.Geometry.InstancedStaticMeshes=1
CVars=r.RayTracing.Geometry.InstancedStaticMeshes.Culling=1
CVars=r.RayTracing.Geometry.InstancedStaticMeshes.MinLOD=1
CVars=r.RayTracing.Geometry.InstancedStaticMeshes.CullClusterRadius=6000
CVars=r.RayTracing.Geometry.InstancedStaticMeshes.LowScaleRadiusThreshold=80
CVars=r.RayTracing.Geometry.InstancedStaticMeshes.LowScaleCullRadius=1200
CVars=r.RayTracing.Geometry.InstancedStaticMeshes.CullAngle=5
CVars=r.RayTracing.Geometry.InstancedStaticMeshes.EvaluateWPO=0
CVars=r.RayTracing.Geometry.LandscapeGrass=0
CVars=r.RayTracing.Geometry.NaniteProxies=1
CVars=r.RayTracing.Geometry.NaniteProxies.LODBias=1
CVars=r.RayTracing.Geometry.NaniteProxies.WPO=0
CVars=r.RayTracing.OnDemandGeometryBuffersStreaming=True
CVars=r.RayTracing.Culling=1
CVars=r.RayTracing.Culling.Radius=12000

; Path Tracing quality for offline viewport/cinematic renders.
CVars=r.PathTracing.SamplesPerPixel=256
CVars=r.PathTracing.MaxBounces=12
CVars=r.PathTracing.FilterWidth=1.0

; Nanite detail and streaming for 24GB VRAM.
CVars=r.Nanite=1
CVars=r.Nanite.AllowTessellation=1
CVars=r.Nanite.MaxPixelsPerEdge=0.5
CVars=r.Nanite.Streaming.PoolSize=8192
CVars=r.Nanite.Streaming.NumInitialRootPages=8192
CVars=r.Nanite.Streaming.MaxPageInstallsPerFrame=256
CVars=r.Nanite.Streaming.Async=1

; Texture clarity. 16GB pool leaves VRAM headroom on RTX 3090.
CVars=r.TextureStreaming=1
CVars=r.Streaming.PoolSize=16384
CVars=r.Streaming.MaxTempMemoryAllowed=4096
CVars=r.Streaming.MipBias=0
CVars=r.MipMapLODBias=0
CVars=r.Streaming.Boost=1.5
CVars=r.Streaming.UseFixedPoolSize=1
CVars=r.Streaming.LimitPoolSizeToVRAM=1
CVars=r.VT.AnisotropicFiltering=True
CVars=r.VT.MaxUploadsPerFrame=16
CVars=r.VT.MaxUploadsPerFrameInEditor=32

; Smooth detailed shadows.
CVars=r.Shadow.Virtual.Enable=1
CVars=r.Shadow.Virtual.OnePassProjection.MaxLightsPerPixel=32
CVars=r.Shadow.Virtual.MaxPhysicalPages=16384
CVars=r.Shadow.CSM.MaxCascades=4
CVars=r.Shadow.MaxResolution=4096
CVars=r.Shadow.RadiusThreshold=0.005
CVars=r.Shadow.DistanceScale=2.0
CVars=r.Shadow.TransitionScale=1.0
CVars=r.DFShadowQuality=3
CVars=r.LightFunctionQuality=1

; Reflections, fog, color, post.
CVars=r.SSR.Quality=4
CVars=r.SSR.Temporal=1
CVars=r.SSR.HalfResSceneColor=0
CVars=r.ReflectionCaptureResolution=2048
CVars=r.RefractionQuality=3
CVars=r.VolumetricFog=1
CVars=r.VolumetricFog.GridPixelSize=8
CVars=r.VolumetricFog.GridSizeZ=128
CVars=r.AmbientOcclusion.Method=1
CVars=r.AmbientOcclusionLevels=3
CVars=r.AmbientOcclusionMaxQuality=100
CVars=r.Tonemapper.Quality=5
CVars=r.DefaultFeature.Bloom=1
CVars=r.DefaultFeature.MotionBlur=0
CVars=r.DefaultFeature.AmbientOcclusion=1
CVars=r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=True

; Epic/Cinematic scalability.
CVars=r.MaterialQualityLevel=3
CVars=sg.ResolutionQuality=100
CVars=sg.ViewDistanceQuality=4
CVars=sg.AntiAliasingQuality=4
CVars=sg.ShadowQuality=4
CVars=sg.PostProcessQuality=4
CVars=sg.TextureQuality=4
CVars=sg.EffectsQuality=4
CVars=sg.FoliageQuality=4
CVars=sg.ShadingQuality=4
CVars=sg.ReflectionQuality=4
CVars=sg.GlobalIlluminationQuality=4
