[/Script/Engine.DeviceProfileManager]
+DeviceProfiles=Windows
+DeviceProfiles=WindowsEditor
+DeviceProfiles=WindowsNoEditor
+DeviceProfiles=WindowsServer

[Windows DeviceProfile]
BaseProfileName=
DeviceType=PC
bIsDefaultProfile=False        ; ⚡ Oldingi True o‘rniga False — endi har OpenLevelda qayta yuklanmaydi
bDeviceProfileOverride=False   ; ⚡ Unreal faqat birinchi ishga tushganda qo‘llaydi

CVars=r.DefaultFeature.Bloom=1
CVars=r.DefaultFeature.AntiAliasing=2
CVars=r.AntiAliasingMethod=2
CVars=r.DefaultFeature.MotionBlur=0
CVars=r.DefaultFeature.AmbientOcclusion=1
CVars=r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=True
CVars=r.DefaultFeature.AutoExposure.Method=1
CVars=r.DefaultFeature.LumenReflections=1
CVars=r.Lumen.Reflections.HardwareRayTracing=1
CVars=r.Lumen.Reflections.ScreenTraces=1
; Lumen async-compute page-fault GPU crash fix (2026-07-03 qayta tiklandi) — .HardwareRayTracing.Async UE5.8 da yo'q
CVars=r.Lumen.DiffuseIndirect.AsyncCompute=0
CVars=r.GPUCrashDebugging=1
CVars=r.Lumen.DiffuseIndirect=1
CVars=r.Lumen.Reflections.MaxRoughness=1
CVars=r.LumenSceneDetail=1
CVars=r.LumenSceneLightingQuality=1
CVars=r.LumenSceneViewDistance=20000
CVars=r.Shadow.Virtual.Enable=1
CVars=r.Shadow.Virtual.AllowScreenOverflowMessages=0
CVars=r.Shadow.Virtual.OnePassProjection.MaxLightsPerPixel=32
CVars=r.Shadow.Virtual.MaxPhysicalPages=8192
CVars=r.Shadow.CSM.MaxCascades=4
CVars=r.Shadow.MaxResolution=2048
CVars=r.SSGI.Quality=4
CVars=r.SSR.Quality=4
CVars=r.SSR.Temporal=1
CVars=r.TemporalAA.Upsampling=1
CVars=r.ViewDistanceScale=1.0
CVars=r.SkeletalMeshLODBias=0
CVars=r.StaticMeshLODDistanceScale=1.0
CVars=r.Streaming.PoolSize=9216
CVars=r.ReflectionCaptureResolution=2048
CVars=r.RayTracing=True
; ⚡ 2026-07-03 (package tayyorgarligi): True->False. DefaultEngine.ini bilan izchillik SHART edi
; (u yerda ikkovi ham False). Lumen HWRT (GI+Reflections) + VSM soyalar allaqachon Epic soya beradi;
; alohida RayTracing.Shadows/Skylight = 2x RT yuk + ortiqcha VRAM. False => packaged EXE yengilroq, crashsiz.
CVars=r.RayTracing.Shadows=False
CVars=r.RayTracing.Skylight=False
; RT residency: engine STANDARTI reference-based=1 => soxta "0 B / 15,999 EiB" over-budget xatosi ketadi.
; (memreport tasdiqladi: haqiqiy RT AS ~2.3 GB < 4 GB, budget oshmayapti; =0 accounting'ni buzardi.)
; Play/PIE paytida DEVICE PROFILE qo'llanadi, shuning uchun bu yerda ham DefaultEngine.ini bilan bir xil bo'lishi SHART.
CVars=r.RayTracing.ResidentGeometryMemoryPoolSizeInMB=4096
CVars=r.RayTracing.UseReferenceBasedResidency=1
CVars=r.RayTracing.NumAlwaysResidentLODs=0
CVars=r.AllowOcclusionQueries=True
CVars=r.Nanite.AllowTessellation=True
CVars=r.Nanite.Streaming.NumInitialRootPages=8192
CVars=r.Nanite.MaxPixelsPerEdge=2
CVars=r.LumenReflections.SampleCount=128
CVars=r.Lumen.TranslucencyReflections=1
CVars=r.Lumen.TranslucencyReflections.FrontLayer.EnableForProject=0
CVars=r.Lumen.TranslucencyReflections.FrontLayer.Allow=0
CVars=r.GenerateMeshDistanceFields=True
CVars=r.DistanceFields.DefaultVoxelDensity=0.6
CVars=r.DefaultFeature.LightUnits=1
CVars=r.ReflectionMethod=1
CVars=r.DynamicGlobalIlluminationMethod=1
CVars=r.RayTracing.GlobalIllumination=False
CVars=r.RayTracing.Reflections=False
CVars=r.LumenSceneLightingUpdateSpeed=1
CVars=r.Fog=1
CVars=r.FogDensity=0.02
CVars=r.VolumetricFog=1
CVars=r.VolumetricFog.GridPixelSize=16
CVars=r.VolumetricFog.HistoryWeight=0.9
CVars=r.TranslucencyLightingVolumeDim=64
CVars=r.SSS.Quality=1
CVars=r.EyeAdaptationQuality=2
CVars=r.Tonemapper.Sharpen=1.5
CVars=r.Tonemapper.Quality=5
CVars=r.TonemapperFilm=1
CVars=r.MipMapLODBias=0

